# Clasto Agent 配置文件版本（请勿修改此行）
配置文件版本 = "1.0.0"

bot的名字 = "你的bot名字"
模型调用自动重试次数 = 1 # 模型调用失败后的自动重试次数，默认1（总尝试=1+重试次数）

["消息分割器"]
启用 = false # 启用后回复模型将使用流式输出，并在输出到换行或句号时分段发送消息

["群聊回复逻辑"]
mode = "群聊回复优化" # 可选: "群聊回复优化" 或 "直接规划"
关闭规划模型 = false # 警告: 关闭后将无法使用联网搜索、查群列表、发消息、多轮执行等工具能力

["私聊回复逻辑"]
mode = "直接规划" # 可选: "群聊回复优化" 或 "直接规划"
关闭规划模型 = false # 警告: 关闭后将无法使用联网搜索、查群列表、发消息、多轮执行等工具能力

["群聊回复优化"]
原因最大字数 = 30
上下文条数 = 7 # 传给筛选模型的最近上下文条数，默认7
at必回复 = true
提及关键词 = []

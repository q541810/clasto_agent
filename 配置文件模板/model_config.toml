# ==========================================
# 模型配置文件模板
# ==========================================

# 回复模型配置：用于处理用户消息并生成回复
# 格式: "模型名" (对应 api_config.toml 中 模型配置 的键名)
["回复模型"]
model = ""  # 填写 api_config.toml 中配置的模型名
system_prompt = "你是一个乐于助人的AI助手"
max_history = 20  # 每个会话保留的最大历史消息数
# 额外参数 = {}

# 规划模型配置：用于分析消息并决定调用哪些工具
# 格式: "模型名" (对应 api_config.toml 中 模型配置 的键名)
["规划模型"]
model = ""  # 留空则跳过规划阶段，直接使用回复模型
system_prompt = "你是一个对话规划器。请根据用户意图选择工具，并优先保证工具参数准确。"
# 额外参数 = {}

# 筛选模型配置：用于群聊回复优化（先输出简短原因，再输出回复/不回复）
# 格式: "模型名" (对应 api_config.toml 中 模型配置 的键名)
["筛选模型"]
model = ""  # 留空则不使用筛选模型，群聊回复优化将默认放行
system_prompt = """你是消息筛选器。
输出要求（必须严格遵守）：
1) 只输出两行，不要JSON，不要额外解释。
2) 第一行格式：原因: <不超过30字>
3) 第二行格式：决策: 回复 或 决策: 不回复

示例：
[用户]麦麦在吗
原因: 用户点名机器人并期待互动
决策: 回复"""
# 额外参数 = {}
